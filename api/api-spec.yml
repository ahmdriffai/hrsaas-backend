openapi: 3.0.3
info:
  title: HR SaaS Backend - Time Off API
  version: 1.0.0
  description: |
    API spec for Time Off feature.
servers:
  - url: http://127.0.0.1:9000
    description: Local
  - url: https://localhost:9000
    description: Local

tags:
  - name: Time Off Requests
  - name: Time Off Types
  - name: Time Off Attachments
  - name: Time Off Balances

security:
  - bearerAuth: []

paths:
  /api/time-off-requests:
    post:
      tags: [Time Off Requests]
      summary: Create time off request
      operationId: createTimeOffRequest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTimeOffRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebResponseTimeOffRequest'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }
    get:
      tags: [Time Off Requests]
      summary: List time off requests
      operationId: listTimeOffRequests
      parameters:
        - in: query
          name: employee_id
          schema:
            type: string
        - in: query
          name: time_off_type_id
          schema:
            type: string
        - in: query
          name: request_status
          schema:
            $ref: '#/components/schemas/RequestStatus'
        - in: query
          name: start_date
          schema:
            type: string
            format: date
        - in: query
          name: end_date
          schema:
            type: string
            format: date
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: size
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebResponseTimeOffRequestList'
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/time-off-requests/{id}:
    get:
      tags: [Time Off Requests]
      summary: Get time off request detail
      operationId: getTimeOffRequestById
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebResponseTimeOffRequest'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/time-off-requests/{id}/approve:
    patch:
      tags: [Time Off Requests]
      summary: Approve request
      operationId: approveTimeOffRequest
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApproveTimeOffRequest'
      responses:
        '200':
          description: Approved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebResponseTimeOffRequest'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/time-off-requests/{id}/reject:
    patch:
      tags: [Time Off Requests]
      summary: Reject request
      operationId: rejectTimeOffRequest
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RejectTimeOffRequest'
      responses:
        '200':
          description: Rejected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebResponseTimeOffRequest'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/time-off-requests/{id}/attachments:
    post:
      tags: [Time Off Attachments]
      summary: Upload attachment to request
      operationId: uploadTimeOffAttachment
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebResponseTimeOffAttachment'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    get:
      tags: [Time Off Attachments]
      summary: List request attachments
      operationId: listTimeOffAttachments
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebResponseTimeOffAttachmentList'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/time-off-types:
    get:
      tags: [Time Off Types]
      summary: List time off types
      operationId: listTimeOffTypes
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebResponseTimeOffTypeList'
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [Time Off Types]
      summary: Create time off type
      operationId: createTimeOffType
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTimeOffTypeRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebResponseTimeOffType'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /api/time-off-balances:
    get:
      tags: [Time Off Balances]
      summary: List balances
      operationId: listTimeOffBalances
      parameters:
        - in: query
          name: employee_id
          schema:
            type: string
        - in: query
          name: time_off_type_id
          schema:
            type: string
        - in: query
          name: period_year
          schema:
            type: integer
            minimum: 2000
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebResponseTimeOffBalanceList'
        '401': { $ref: '#/components/responses/Unauthorized' }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Token

  parameters:
    IdPath:
      in: path
      name: id
      required: true
      schema:
        type: string

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    RequestStatus:
      type: string
      enum: [PENDING, APPROVED, REJECTED]

    TimeOffCategory:
      type: string
      enum: [IZIN, SAKIT, CUTI]

    TimeOffRequest:
      type: object
      properties:
        id:
          type: string
        employee_id:
          type: string
        time_off_type_id:
          type: string
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        requested_days:
          type: number
          format: float
          minimum: 0
        request_reason:
          type: string
        request_status:
          $ref: '#/components/schemas/RequestStatus'
        action_by:
          type: string
          nullable: true
        action_at:
          type: string
          format: date-time
          nullable: true
        action_reason:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    CreateTimeOffRequest:
      type: object
      required:
        - time_off_type_id
        - start_date
        - end_date
        - requested_days
        - request_reason
      properties:
        time_off_type_id:
          type: string
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        requested_days:
          type: number
          format: integer
          minimum: 1
        request_reason:
          type: string
          maxLength: 255

    ApproveTimeOffRequest:
      type: object
      properties:
        action_reason:
          type: string
          maxLength: 255
          description: Optional note when approving.

    RejectTimeOffRequest:
      type: object
      required:
        - action_reason
      properties:
        action_reason:
          type: string
          maxLength: 255

    TimeOffType:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        category:
          $ref: '#/components/schemas/TimeOffCategory'
        is_quota_based:
          type: boolean
        default_quota_days:
          type: integer
          minimum: 0

    CreateTimeOffTypeRequest:
      type: object
      required:
        - name
        - category
      properties:
        name:
          type: string
          maxLength: 100
        category:
          $ref: '#/components/schemas/TimeOffCategory'
        is_quota_based:
          type: boolean
          default: false
        default_quota_days:
          type: integer
          minimum: 0
          default: 0

    TimeOffAttachment:
      type: object
      properties:
        id:
          type: string
        time_off_request_id:
          type: string
        file_name:
          type: string
        mime_type:
          type: string
        file_size:
          type: integer
          minimum: 0
        file_url:
          type: string

    TimeOffBalance:
      type: object
      properties:
        id:
          type: string
        employee_id:
          type: string
        time_off_type_id:
          type: string
        period_year:
          type: integer
        entitled_days:
          type: integer
          minimum: 0
        used_days:
          type: integer
          minimum: 0
        remaining_days:
          type: integer

    PageMetadata:
      type: object
      properties:
        page:
          type: integer
        size:
          type: integer
        total_item:
          type: integer
        total_page:
          type: integer

    ErrorResponse:
      type: object
      properties:
        error:
          type: string

    WebResponseTimeOffRequest:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/TimeOffRequest'
        errors:
          type: string
          nullable: true

    WebResponseTimeOffRequestList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/TimeOffRequest'
        paging:
          $ref: '#/components/schemas/PageMetadata'
        errors:
          type: string
          nullable: true

    WebResponseTimeOffType:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/TimeOffType'
        errors:
          type: string
          nullable: true

    WebResponseTimeOffTypeList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/TimeOffType'
        errors:
          type: string
          nullable: true

    WebResponseTimeOffAttachment:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/TimeOffAttachment'
        errors:
          type: string
          nullable: true

    WebResponseTimeOffAttachmentList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/TimeOffAttachment'
        errors:
          type: string
          nullable: true

    WebResponseTimeOffBalanceList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/TimeOffBalance'
        errors:
          type: string
          nullable: true
