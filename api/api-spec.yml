openapi: 3.0.3
info:
  title: HR SaaS Backend - Time Off API
  version: 1.0.0
  description: |
    API spec for Time Off feature.
servers:
  - url: http://127.0.0.1:9000
    description: Local
  - url: https://localhost:9000
    description: Local

tags:
  - name: Time Off Requests
  - name: Time Off Types
  - name: Time Off Balances
  - name: Common

security:
  - bearerAuth: []

paths:
  /api/time-off-requests:
    post:
      tags: [Time Off Requests]
      summary: Create time off request
      description: Employee and company scope are derived from bearer token.
      operationId: createTimeOffRequest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTimeOffRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessTimeOffRequestResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }
    get:
      tags: [Time Off Requests]
      summary: List time off requests
      operationId: listTimeOffRequests
      parameters:
        - in: query
          name: time_off_type_id
          schema:
            type: string
        - in: query
          name: request_status
          schema:
            $ref: '#/components/schemas/RequestStatus'
        - in: query
          name: start_date
          schema:
            type: string
            format: date
        - in: query
          name: end_date
          schema:
            type: string
            format: date
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: size
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessTimeOffRequestListResponse'
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/time-off-requests/{id}:
    get:
      tags: [Time Off Requests]
      summary: Get time off request detail
      operationId: getTimeOffRequestById
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessTimeOffRequestResponse'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/time-off-requests/_current:
    get:
      tags: [Time Off Requests]
      summary: List current user time off requests
      operationId: listCurrentUserTimeOffRequests
      parameters:
        - in: query
          name: time_off_type_id
          schema:
            type: string
        - in: query
          name: request_status
          schema:
            $ref: '#/components/schemas/RequestStatus'
        - in: query
          name: start_date
          schema:
            type: string
            format: date
        - in: query
          name: end_date
          schema:
            type: string
            format: date
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: size
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessTimeOffRequestListResponse'
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/time-off-requests/{id}/approve:
    patch:
      tags: [Time Off Requests]
      summary: Approve request
      operationId: approveTimeOffRequest
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApproveTimeOffRequest'
      responses:
        '200':
          description: Approved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessTimeOffRequestResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/time-off-requests/{id}/reject:
    patch:
      tags: [Time Off Requests]
      summary: Reject request
      operationId: rejectTimeOffRequest
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RejectTimeOffRequest'
      responses:
        '200':
          description: Rejected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessTimeOffRequestResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/upload:
    post:
      tags: [Common]
      summary: Upload File
      operationId: uploadFile
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                path:
                  type: string
                  description: Directory prefix for uploaded files.
                  example: "time-off/sakit/"
      responses:
        '200':
          description: Upload berhasil
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadSuccessResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '413':
          description: Payload too large
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/time-off-types:
    get:
      tags: [Time Off Types]
      summary: List time off types
      operationId: listTimeOffTypes
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessTimeOffTypeListResponse'
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [Time Off Types]
      summary: Create time off type
      operationId: createTimeOffType
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTimeOffTypeRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessTimeOffTypeResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /api/time-off-balances:
    get:
      tags: [Time Off Balances]
      summary: List balances
      operationId: listTimeOffBalances
      parameters:
        - in: query
          name: time_off_type_id
          schema:
            type: string
        - in: query
          name: period_year
          schema:
            type: integer
            minimum: 2000
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessTimeOffBalanceListResponse'
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/time-off-balances/_current:
    get:
      tags: [Time Off Balances]
      summary: List current user time off balances
      operationId: listCurrentUserTimeOffBalances
      parameters:
        - in: query
          name: time_off_type_id
          schema:
            type: string
        - in: query
          name: period_year
          schema:
            type: integer
            minimum: 2000
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessTimeOffBalanceListResponse'
        '401': { $ref: '#/components/responses/Unauthorized' }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Token

  parameters:
    IdPath:
      in: path
      name: id
      required: true
      schema:
        type: string

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    RequestStatus:
      type: string
      enum: [PENDING, APPROVED, REJECTED]

    TimeOffCategory:
      type: string
      enum: [IZIN, SAKIT, CUTI]

    TimeOffRequest:
      type: object
      properties:
        id:
          type: string
        employee_id:
          type: string
        time_off_type_id:
          type: string
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        requested_days:
          type: number
          format: float
          minimum: 0
        request_reason:
          type: string
        request_status:
          $ref: '#/components/schemas/RequestStatus'
        action_by:
          type: string
          nullable: true
        action_at:
          type: string
          format: date-time
          nullable: true
        action_reason:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    CreateTimeOffRequest:
      type: object
      required:
        - time_off_type_id
        - start_date
        - end_date
        - requested_days
        - request_reason
      properties:
        time_off_type_id:
          type: string
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        requested_days:
          type: number
          format: float
          minimum: 0.25
        request_reason:
          type: string
          maxLength: 255

    ApproveTimeOffRequest:
      type: object
      properties:
        action_reason:
          type: string
          maxLength: 255
          description: Optional note when approving.

    RejectTimeOffRequest:
      type: object
      required:
        - action_reason
      properties:
        action_reason:
          type: string
          maxLength: 255

    TimeOffType:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        category:
          $ref: '#/components/schemas/TimeOffCategory'
        is_quota_based:
          type: boolean
        default_quota_days:
          type: integer
          minimum: 0

    CreateTimeOffTypeRequest:
      type: object
      required:
        - name
        - category
      properties:
        name:
          type: string
          maxLength: 100
        category:
          $ref: '#/components/schemas/TimeOffCategory'
        is_quota_based:
          type: boolean
          default: false
        default_quota_days:
          type: integer
          minimum: 0
          default: 0

    UploadSuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Upload successful
        data:
          $ref: '#/components/schemas/UploadedFileItem'

    UploadedFileItem:
      type: object
      properties:
        file_url:
          type: string
          example: http://example.com/uploads/time-off/sakit/file.jpg
        file_name:
          type: string
          example: surat-dokter.jpg
        mime_type:
          type: string
          example: image/jpeg
        file_size:
          type: integer
          minimum: 0
          example: 345672
        path:
          type: string
          example: time-off/sakit/

    TimeOffBalance:
      type: object
      properties:
        id:
          type: string
        employee_id:
          type: string
        time_off_type_id:
          type: string
        period_year:
          type: integer
        entitled_days:
          type: integer
          minimum: 0
        used_days:
          type: integer
          minimum: 0
        remaining_days:
          type: integer


    PageMetadata:
      type: object
      properties:
        page:
          type: integer
        size:
          type: integer
        total_item:
          type: integer
        total_page:
          type: integer

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Unauthorized

    SuccessTimeOffRequestResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Success
        data:
          $ref: '#/components/schemas/TimeOffRequest'

    SuccessTimeOffRequestListResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Success
        data:
          type: array
          items:
            $ref: '#/components/schemas/TimeOffRequest'
        paging:
          $ref: '#/components/schemas/PageMetadata'

    SuccessTimeOffTypeResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Success
        data:
          $ref: '#/components/schemas/TimeOffType'

    SuccessTimeOffTypeListResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Success
        data:
          type: array
          items:
            $ref: '#/components/schemas/TimeOffType'

    SuccessTimeOffBalanceListResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Success
        data:
          type: array
          items:
            $ref: '#/components/schemas/TimeOffBalance'
